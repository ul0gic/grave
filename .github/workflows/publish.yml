name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked

      - name: Guard — version must match release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(uv run python -c 'import tomllib; d=tomllib.load(open("pyproject.toml","rb")); print(d["project"]["version"])')"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Release tag '${GITHUB_REF_NAME}' resolves to '${TAG}' but pyproject.toml version is '${PKG_VERSION}'. Aborting."
            exit 1
          fi
          echo "Version check passed: ${PKG_VERSION}"

      - name: Build
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/grave-cli

    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
